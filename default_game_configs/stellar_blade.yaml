name: "Stellar Blade"
steam_id: 3489700
nexus_id: stellarblade
accent_colour: "#032396"

mods_path:
- path: "SB/Binaries/Win64/ue4ss/Mods"
  name: Lua Mods
  description: Mods path for Lua mods.
- path: "SB/Content/Paks/~mods"
  name: Paks mods
  description: Pak mod.
- path: "{game_data}/SB/Content/Paks"
  name: Logic Mods
  description: Mods path for logic mods. Keep in mind these mods SHOULD include the LogicMods folder. If they don't you will have to manually set the deployment path to the LogicMods folder.
- path: "SB/Content/Paks/~mods/CustomNanosuitSystem"
  name: Mods for Custom Nanosuit System
  description: Mods path for the mods for Custom Nanosuit System.

essential-utilities:
  SB-UE4SS:
    name: SB-UE4SS
    version: "1.3"
    creator: Rev-OG-UwU
    creator-link: https://github.com/Rev-OG-UwU
    source: https://github.com/Rev-OG-UwU/SB-UE4SS/releases/download/1.3/SB.UE4SS.1.3.zip
    utility_path: "/SB/Binaries/Win64/"
    launch_options: "WINEDLLOVERRIDES='dwmapi=n,b' %command%"